<!DOCTYPE html>
<html lang="es">

<meta charset="UTF-8">

<title>Influencer CRM — Multi-Company</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --card2: #22252f; --border: #2a2d3a;
    --text: #e4e4e7; --text2: #a1a1aa; --accent: #818cf8; --accent2: #6366f1;
    --green: #22c55e; --yellow: #eab308; --red: #ef4444; --orange: #f97316;
    --blue: #3b82f6; --pink: #ec4899; --teal: #14b8a6;
    --company-accent: #818cf8; --company-accent2: #6366f1; --company-glow: rgba(99,102,241,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:var(--bg); color:var(--text); min-height:100vh; transition:background .4s; }
  a { color:var(--company-accent); text-decoration:none; }
  a:hover { text-decoration:underline; }

  /* Auth Screen */
  .auth-overlay { position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center; }
  .auth-box { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:40px; width:100%; max-width:400px; text-align:center; }
  .auth-box h1 { font-size:1.6rem; margin-bottom:4px; }
  .auth-box h1 span { color:var(--company-accent); }
  .auth-subtitle { color:var(--text2); font-size:0.85rem; margin-bottom:24px; }
  .auth-input { width:100%; padding:12px 16px; border-radius:10px; border:1px solid var(--border); background:var(--card2); color:var(--text); font-size:0.95rem; outline:none; margin-bottom:12px; }
  .auth-input:focus { border-color:var(--company-accent); }
  .auth-btn { width:100%; padding:12px; border-radius:10px; border:none; background:var(--company-accent2); color:#fff; font-size:1rem; font-weight:600; cursor:pointer; transition:all .2s; }
  .auth-btn:hover { background:var(--company-accent); }
  .auth-toggle { color:var(--company-accent); cursor:pointer; font-size:0.85rem; margin-top:16px; display:inline-block; }
  .auth-toggle:hover { text-decoration:underline; }
  .auth-error { color:var(--red); font-size:0.83rem; margin-bottom:12px; }
  .auth-success { color:var(--green); font-size:0.83rem; margin-bottom:12px; }

  /* Company bar */
  .company-bar { background:var(--company-accent2); color:#fff; padding:8px 24px; display:flex; align-items:center; justify-content:space-between; gap:12px; font-size:0.85rem; position:sticky; top:0; z-index:150; box-shadow:0 2px 12px var(--company-glow); transition: background .4s; }
  .company-bar-left { display:flex; align-items:center; gap:10px; font-weight:700; font-size:1rem; }
  .company-bar-left .co-icon { font-size:1.3rem; }
  .company-bar-right { display:flex; align-items:center; gap:8px; }
  .company-selector { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); border-radius:8px; color:#fff; padding:5px 12px; font-size:0.82rem; cursor:pointer; outline:none; font-weight:600; }
  .company-selector option { background:var(--card); color:var(--text); }
  .co-manage-btn { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); border-radius:8px; color:#fff; padding:5px 10px; font-size:0.78rem; cursor:pointer; }
  .co-manage-btn:hover { background:rgba(255,255,255,0.3); }

  /* User badge in header */
  .user-badge { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.2); border-radius:10px; padding:4px 10px; }
  .user-avatar-sm { width:24px; height:24px; border-radius:50%; background:rgba(255,255,255,0.3); display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:700; color:#fff; }
  .user-name { font-size:0.78rem; font-weight:600; }
  .logout-btn { background:none; border:none; color:rgba(255,255,255,0.7); cursor:pointer; font-size:0.72rem; padding:2px 6px; border-radius:4px; }
  .logout-btn:hover { color:#fff; background:rgba(255,255,255,0.15); }

  /* Header */
  .header { background:var(--card); border-bottom:1px solid var(--border); padding:14px 24px; position:sticky; top:40px; z-index:100; }
  .header-top { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  .header h1 { font-size:1.3rem; font-weight:700; }
  .header h1 span { color:var(--company-accent); }
  .header-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .sync-status { font-size:0.75rem; color:var(--text2); padding:4px 10px; border-radius:12px; background:var(--card2); }
  .sync-status.ok { color:var(--green); }
  .sync-status.err { color:var(--red); }
  .sync-status.loading { color:var(--yellow); }

  /* Buttons */
  .btn { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:var(--card2); color:var(--text); cursor:pointer; font-size:0.85rem; transition:all .2s; display:inline-flex; align-items:center; gap:6px; }
  .btn:hover { background:var(--company-accent2); border-color:var(--company-accent2); color:#fff; }
  .btn-sm { padding:5px 10px; font-size:0.78rem; }
  .btn-accent { background:var(--company-accent2); border-color:var(--company-accent2); color:#fff; }
  .btn-accent:hover { background:var(--company-accent); }
  .btn-green { background:#166534; border-color:#166534; color:#fff; }
  .btn-green:hover { background:var(--green); color:#000; }

  /* Stats */
  .stats { display:flex; gap:12px; padding:16px 24px; flex-wrap:wrap; }
  .stat { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 20px; flex:1; min-width:140px; }
  .stat-label { font-size:0.75rem; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; }
  .stat-value { font-size:1.6rem; font-weight:700; margin-top:4px; }
  .stat-value.accent { color:var(--company-accent); }
  .stat-value.green { color:var(--green); }
  .stat-value.yellow { color:var(--yellow); }
  .stat-value.pink { color:var(--pink); }

  /* Progress bar */
  .progress-wrap { padding:0 24px 8px; }
  .progress-bar { height:6px; background:var(--card2); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg, var(--company-accent2), var(--green)); border-radius:3px; transition:width .5s; }

  /* Search & Filters */
  .controls { padding:12px 24px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .search-input { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px 14px; color:var(--text); font-size:0.9rem; width:260px; outline:none; }
  .search-input:focus { border-color:var(--company-accent); }
  .filter-btn { padding:6px 14px; border-radius:20px; border:1px solid var(--border); background:var(--card); color:var(--text2); cursor:pointer; font-size:0.8rem; transition:all .2s; }
  .filter-btn:hover, .filter-btn.active { background:var(--company-accent2); color:#fff; border-color:var(--company-accent2); }
  .filter-select { padding:6px 12px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:0.8rem; cursor:pointer; outline:none; min-width:120px; }
  .filter-select:focus { border-color:var(--company-accent); }
  .filter-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; padding:0 24px 8px; }
  .filter-label { font-size:0.72rem; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; }

  /* Cards grid */
  .cards { padding:12px 24px 40px; display:grid; grid-template-columns:repeat(auto-fill, minmax(380px, 1fr)); gap:14px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:all .2s; }
  .card:hover { border-color:var(--company-accent); }
  .card-head { padding:16px; display:flex; justify-content:space-between; align-items:flex-start; cursor:pointer; }
  .card-info { display:flex; gap:12px; align-items:center; flex:1; min-width:0; }
  .avatar { width:48px; height:48px; border-radius:50%; background:var(--company-accent2); display:flex; align-items:center; justify-content:center; font-size:1.2rem; font-weight:700; color:#fff; flex-shrink:0; transition:background .4s; }
  .card-name { font-weight:600; font-size:0.95rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-user { font-size:0.8rem; color:var(--text2); }
  .card-meta { font-size:0.75rem; color:var(--text2); margin-top:2px; }
  .card-badges { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
  .badge { font-size:0.7rem; padding:2px 8px; border-radius:10px; }
  .badge-high { background:#422006; color:var(--orange); }
  .badge-medio { background:#422006; color:var(--yellow); }
  .badge-bajo { background:#1a2e05; color:var(--green); }
  .badge-verified { background:#1e1b4b; color:var(--company-accent); }

  /* Status badge */
  .status-badge { font-size:0.75rem; padding:4px 10px; border-radius:10px; white-space:nowrap; }
  .s-pendiente { background:#422006; color:var(--yellow); }
  .s-enviado_1 { background:#172554; color:var(--blue); }
  .s-fu1_enviado, .s-fu2_enviado, .s-fu3_enviado { background:#1e1b4b; color:var(--company-accent); }
  .s-respondio { background:#052e16; color:var(--green); }
  .s-en_negociacion { background:#3b1764; color:var(--pink); }
  .s-cerrado_si { background:#052e16; color:var(--green); font-weight:700; }
  .s-no_interesada { background:#2a0a0a; color:var(--red); }

  /* Card expanded */
  .card-body { padding:0 16px 16px; display:none; }
  .card.expanded .card-body { display:block; }
  .section-title { font-size:0.75rem; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; margin:12px 0 6px; }
  .bio-text { font-size:0.83rem; color:var(--text2); line-height:1.5; }
  .msg-card { background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:12px; margin:6px 0; }
  .msg-label { font-size:0.72rem; color:var(--company-accent); font-weight:600; text-transform:uppercase; margin-bottom:6px; }
  .msg-text { font-size:0.83rem; line-height:1.5; white-space:pre-wrap; }
  .msg-actions { display:flex; gap:6px; margin-top:8px; }
  .tip-box { background:rgba(99,102,241,0.1); border:1px solid var(--company-accent2); border-radius:10px; padding:12px; margin:6px 0; transition:background .4s, border-color .4s; }
  .tip-box .msg-label { color:var(--yellow); }

  /* Company identity banner inside cards */
  .company-identity { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:8px; margin:8px 0; font-size:0.8rem; font-weight:600; border:1px solid var(--company-accent2); background:var(--company-glow); color:var(--company-accent); transition: all .4s; }
  .company-identity .co-dot { width:10px; height:10px; border-radius:50%; background:var(--company-accent); }

  /* Notes */
  .notes-area { width:100%; background:var(--card2); border:1px solid var(--border); border-radius:8px; padding:10px; color:var(--text); font-size:0.83rem; resize:vertical; min-height:60px; outline:none; font-family:inherit; }
  .notes-area:focus { border-color:var(--company-accent); }
  .note-entry { background:var(--card2); border:1px solid var(--border); border-radius:8px; padding:10px; margin:4px 0; font-size:0.83rem; }
  .note-author { color:var(--company-accent); font-weight:600; font-size:0.75rem; }
  .note-company-tag { font-size:0.68rem; padding:1px 6px; border-radius:6px; margin-left:6px; font-weight:600; }
  .note-date { color:var(--text2); font-size:0.7rem; margin-left:8px; }
  .note-text { color:var(--text); margin-top:4px; line-height:1.4; }
  .add-note-wrap { display:flex; gap:8px; margin-top:8px; }
  .add-note-wrap .notes-area { flex:1; min-height:40px; }

  /* History */
  .history-item { font-size:0.78rem; color:var(--text2); padding:4px 0; border-bottom:1px solid var(--border); }
  .history-item:last-child { border-bottom:none; }
  .history-date { color:var(--company-accent); font-weight:600; }
  .history-user { color:var(--pink); font-weight:600; }

  /* Counter */
  .contact-counter { display:flex; align-items:center; gap:8px; margin:8px 0; }
  .counter-val { font-size:1.1rem; font-weight:700; color:var(--company-accent); }

  /* Empty state */
  .empty { text-align:center; padding:60px 24px; color:var(--text2); }
  .empty h2 { font-size:1.2rem; margin-bottom:8px; }

  /* Activity Log Panel */
  .activity-panel { position:fixed; right:0; top:0; bottom:0; width:420px; max-width:90vw; background:var(--card); border-left:1px solid var(--border); z-index:200; display:flex; flex-direction:column; transform:translateX(100%); transition:transform .3s ease; }
  .activity-panel.open { transform:translateX(0); }
  .activity-panel-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); }
  .activity-panel-header h2 { font-size:1.1rem; }
  .activity-list { flex:1; overflow-y:auto; padding:12px 20px; }
  .activity-item { padding:10px 0; border-bottom:1px solid var(--border); font-size:0.82rem; }
  .activity-item:last-child { border-bottom:none; }
  .activity-time { color:var(--text2); font-size:0.72rem; }
  .activity-user-tag { color:var(--company-accent); font-weight:600; }
  .activity-action { color:var(--text); margin-top:2px; }
  .activity-target { color:var(--teal); }
  .activity-company-tag { font-size:0.68rem; padding:1px 6px; border-radius:6px; font-weight:600; margin-left:4px; }
  .activity-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:199; }
  .activity-filters { display:flex; gap:6px; padding:8px 20px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .activity-filter-btn { padding:3px 10px; border-radius:12px; border:1px solid var(--border); background:var(--card2); color:var(--text2); cursor:pointer; font-size:0.72rem; }
  .activity-filter-btn.active { background:var(--company-accent2); color:#fff; border-color:var(--company-accent2); }

  /* Company Manager Modal */
  .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:300; display:flex; align-items:center; justify-content:center; }
  .modal { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:28px; width:100%; max-width:520px; max-height:85vh; overflow-y:auto; }
  .modal h2 { font-size:1.2rem; margin-bottom:16px; }
  .modal-input { width:100%; padding:10px 14px; border-radius:8px; border:1px solid var(--border); background:var(--card2); color:var(--text); font-size:0.9rem; outline:none; margin-bottom:10px; }
  .modal-input:focus { border-color:var(--company-accent); }
  .modal-textarea { width:100%; padding:10px 14px; border-radius:8px; border:1px solid var(--border); background:var(--card2); color:var(--text); font-size:0.85rem; outline:none; margin-bottom:10px; font-family:inherit; resize:vertical; min-height:60px; }
  .modal-textarea:focus { border-color:var(--company-accent); }
  .modal-label { font-size:0.78rem; color:var(--text2); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px; }
  .color-picker-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  .color-swatch { width:36px; height:36px; border-radius:10px; cursor:pointer; border:3px solid transparent; transition:all .2s; }
  .color-swatch:hover, .color-swatch.active { border-color:#fff; transform:scale(1.1); }
  .company-list-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid var(--border); border-radius:10px; margin-bottom:8px; }
  .company-list-item .co-color-dot { width:16px; height:16px; border-radius:50%; flex-shrink:0; }
  .company-list-item .co-name { font-weight:600; flex:1; }
  .company-list-item .co-actions { display:flex; gap:4px; }

  /* Responsive */
  @media (max-width:600px) {
    .cards { grid-template-columns:1fr; padding:8px 12px 40px; }
    .stats { padding:12px; gap:8px; }
    .stat { min-width:100px; padding:10px 14px; }
    .controls { padding:8px 12px; }
    .search-input { width:100%; }
    .header { padding:12px 16px; }
    .activity-panel { width:100%; }
    .company-bar { padding:8px 12px; flex-wrap:wrap; }
  }
</style>
</head>

async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password + '_ig_crm_salt_2026');
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

/* ─── Sheet loading (GViz) ─── */
function loadSheetGviz(sheetId, gid) {
  return new Promise((resolve, reject) => {
    const SCRIPT_ID = '_gviz_load';
    const old = document.getElementById(SCRIPT_ID);
    if (old) old.remove();
    const timer = setTimeout(() => { const el = document.getElementById(SCRIPT_ID); if (el) el.remove(); reject(new Error('Timeout')); }, 15000);
    window.google = window.google || {};
    window.google.visualization = window.google.visualization || {};
    window.google.visualization.Query = window.google.visualization.Query || {};
    window.google.visualization.Query.setResponse = (data) => {
      clearTimeout(timer); const el = document.getElementById(SCRIPT_ID); if (el) el.remove();
      if (!data || data.status === 'error') reject(new Error(data?.errors?.[0]?.message || 'Error'));
      else resolve(data);
    };
    const s = document.createElement('script');
    s.id = SCRIPT_ID;
    s.onerror = () => { clearTimeout(timer); reject(new Error('Script error')); };
    s.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`;
    document.head.appendChild(s);
  });
}

function parseSheetData(data) {
  const { cols, rows } = data.table;
  const idx = {};
  cols.forEach((c, i) => { if (c.label) idx[c.label.trim()] = i; });
  function get(row, label) {
    const i = idx[label]; if (i == null || !row.c?.[i]) return '';
    const cell = row.c[i];
    return (cell.f != null ? String(cell.f) : (cell.v != null ? String(cell.v) : '')).trim();
  }
  return rows.map(row => {
    if (!row?.c) return null;
    const username = get(row, 'username').replace(/^@/, '').trim();
    if (!username) return null;
    let followersRaw = get(row, 'followers_num'), followers = '';
    if (followersRaw) { const num = parseInt(followersRaw, 10); if (!isNaN(num)) { if (num >= 1e6) followers = (num/1e6).toFixed(1).replace(/\.0$/,'')+'M'; else if (num >= 1e3) followers = (num/1e3).toFixed(1).replace(/\.0$/,'')+'K'; else followers = String(num); } else followers = followersRaw; }
    const name = username.replace(/[._]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    const aiScore = parseFloat(get(row, 'ai_score')) || 0;
    let potential = ''; if (aiScore >= 7) potential = 'Alto'; else if (aiScore >= 4) potential = 'Medio'; else if (aiScore > 0) potential = 'Bajo';
    return {
      id: username, username, name, country: get(row,'country'), city: get(row,'city'),
      followers, posts: get(row,'posts_num'), following: get(row,'following_num'),
      source: get(row,'source_acccount'), potential, lifestyle: '',
      bio: get(row,'bio_completa'), accountStatus: get(row,'active_following') === 'true' ? 'Activa' : '',
      verified:'', appearance:'', contentType: get(row,'category'),
      links: get(row,'link_bio'), category: get(row,'category'),
      ambassador: get(row,'ai_status'), notes_sheet: get(row,'ai_reason'),
      aiScore, hasReplied: get(row,'has_replied'), followups: get(row,'number_followups'),
    };
  }).filter(Boolean);
}

/* ─── Copy helper ─── */
async function copyText(text) {
  try { await navigator.clipboard.writeText(text); return true; } catch {
    const ta = document.createElement('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px';
    document.body.appendChild(ta); ta.select(); let ok = false;
    try { ok = document.execCommand('copy'); } catch {} document.body.removeChild(ta); return ok;
  }
}

/* ─── Auth Screen ─── */
function AuthScreen({ onLogin }) {
  const [mode, setMode] = useState('login');
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [displayName, setDisplayName] = useState('');
  const [error, setError] = useState('');
  const [success, setSuccess] = useState('');

  const handleSubmit = async (e) => {
    e.preventDefault(); setError(''); setSuccess('');
    if (!username.trim() || !password.trim()) { setError('Todos los campos son obligatorios'); return; }
    const users = getUsers(); const passHash = await hashPassword(password);
    if (mode === 'signup') {
      if (!displayName.trim()) { setError('El nombre es obligatorio'); return; }
      if (username.trim().length < 3) { setError('El usuario debe tener al menos 3 caracteres'); return; }
      if (password.length < 4) { setError('La contraseña debe tener al menos 4 caracteres'); return; }
      const uid = username.trim().toLowerCase();
      if (users[uid]) { setError('Este usuario ya existe'); return; }
      users[uid] = { displayName: displayName.trim(), passHash, createdAt: new Date().toISOString() };
      saveUsers(users); setSuccess('Cuenta creada. Ahora inicia sesión.'); setMode('login'); setPassword(''); return;
    }
    const uid = username.trim().toLowerCase(); const user = users[uid];
    if (!user || user.passHash !== passHash) { setError('Usuario o contraseña incorrectos'); return; }
    const session = { uid, displayName: user.displayName, loginAt: new Date().toISOString() };
    saveSession(session); logActivity(user.displayName, 'login', '', 'Inicio de sesión'); onLogin(session);
  };

  return (
    <div className="auth-overlay">
      <div className="auth-box">
        <h1>👙 Influencer <span>CRM</span></h1>
        <div className="auth-subtitle">{mode === 'login' ? 'Inicia sesión para continuar' : 'Crea tu cuenta'}</div>
        <form onSubmit={handleSubmit}>
          {error && <div className="auth-error">{error}</div>}
          {success && <div className="auth-success">{success}</div>}
          {mode === 'signup' && <input className="auth-input" type="text" placeholder="Tu nombre (ej: María García)" value={displayName} onChange={e => setDisplayName(e.target.value)} autoComplete="name" />}
          <input className="auth-input" type="text" placeholder="Usuario" value={username} onChange={e => setUsername(e.target.value)} autoComplete="username" />
          <input className="auth-input" type="password" placeholder="Contraseña" value={password} onChange={e => setPassword(e.target.value)} autoComplete={mode==='login'?'current-password':'new-password'} />
          <button type="submit" className="auth-btn">{mode === 'login' ? 'Entrar' : 'Crear cuenta'}</button>
        </form>
        <div className="auth-toggle" onClick={() => { setMode(mode==='login'?'signup':'login'); setError(''); setSuccess(''); }}>
          {mode === 'login' ? '¿No tienes cuenta? Regístrate' : '¿Ya tienes cuenta? Inicia sesión'}
        </div>
      </div>
    </div>
  );
}

      </div>

      <div className="card-body">
        {/* Company identity banner */}
        <div className="company-identity">
          <div className="co-dot" />
          Contactando como <strong style={{marginLeft:4}}>{company?.icon} {companyName}</strong>
        </div>

        {inf.bio && <><div className="section-title">Bio</div><div className="bio-text">{inf.bio}</div></>}
        <div className="tip-box"><div className="msg-label" style={{color:'var(--yellow)'}}>💡 Tip</div><div className="msg-text">{tip}</div></div>

        <div className="section-title">Mensajes — {company?.icon} {companyName}</div>
        {msgs && <>
          <MsgCard label="📤 Primer contacto" text={msgs.first} currentUser={currentUser} influencer={inf.username} companyName={companyName} />
          <MsgCard label="🔄 Follow Up 1" text={msgs.fu1} color="var(--teal)" currentUser={currentUser} influencer={inf.username} companyName={companyName} />
          <MsgCard label="🔄 Follow Up 2" text={msgs.fu2} color="var(--orange)" currentUser={currentUser} influencer={inf.username} companyName={companyName} />
          <MsgCard label="🔄 Follow Up 3" text={msgs.fu3} color="var(--red)" currentUser={currentUser} influencer={inf.username} companyName={companyName} />
        </>}

        <div className="section-title">Acciones</div>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap',margin:'8px 0'}}>
          <button className="btn btn-green btn-sm" onClick={nextStep}>▶ Siguiente paso</button>
          <select className="btn btn-sm" value={infState.status} onChange={e=>setStatus(e.target.value)} onClick={e=>e.stopPropagation()}>
            {STATUS_OPTIONS.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}
          </select>
        </div>
        <div className="contact-counter"><span style={{fontSize:'0.8rem',color:'var(--text2)'}}>Contactos:</span><span className="counter-val">{infState.count}</span></div>

        <div className="section-title">Notas del equipo</div>
        {notes.map((n,i)=>(
          <div className="note-entry" key={i}>
            <span className="note-author">{n.user||'Sistema'}</span>
            {n.company && <span className="note-company-tag" style={{background:'var(--company-glow)',color:'var(--company-accent)'}}>{n.company}</span>}
            <span className="note-date">{new Date(n.date).toLocaleDateString('es-ES',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</span>
            <div className="note-text">{n.text}</div>
          </div>
        ))}
        <div className="add-note-wrap">
          <textarea className="notes-area" value={noteText} onChange={e=>setNoteText(e.target.value)} placeholder="Escribe una nota..." onClick={e=>e.stopPropagation()} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addNote();}}} />
          <button className="btn btn-sm btn-accent" onClick={addNote} style={{alignSelf:'flex-end'}}>+</button>
        </div>

        {infState.history&&infState.history.length>0&&<>
          <div className="section-title">Historial</div>
          {infState.history.slice().reverse().map((h,i)=>(
            <div className="history-item" key={i}>
              <span className="history-date">{h.date}</span>
              {h.user&&<>{' — '}<span className="history-user">{h.user}</span></>}
              {h.company&&<span style={{color:'var(--text2)',fontSize:'0.7rem'}}> ({h.company})</span>}
              {' — '}{h.action}
            </div>
          ))}
        </>}
      </div>
    </div>
  );
}

/* ─── Main App ─── */
function App() {
  const [currentUser, setCurrentUser] = useState(null);
  const [companies, setCompanies] = useState(getCompanies);
  const [activeCoId, setActiveCoId] = useState(getActiveCompanyId);
  const [influencers, setInfluencers] = useState([]);
  const [crmState, setCrmState] = useState({});
  const [syncStatus, setSyncStatus] = useState('idle');
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [filterCountry, setFilterCountry] = useState('all');
  const [filterCity, setFilterCity] = useState('all');
  const [filterScore, setFilterScore] = useState('all');
  const [expanded, setExpanded] = useState({});
  const [activityOpen, setActivityOpen] = useState(false);
  const [coManagerOpen, setCoManagerOpen] = useState(false);

  // Resolve active company
  const activeCo = companies.find(c => c.id === activeCoId) || companies[0];
  const activeTheme = getTheme(activeCo?.theme);

  // Apply theme whenever company changes
  useEffect(() => { if (activeTheme) applyTheme(activeTheme); }, [activeCo?.theme]);

  // Load CRM state when company changes
  useEffect(() => {
    if (activeCo) { setCrmState(loadCompanyState(activeCo.id)); setActiveCompanyId(activeCo.id); }
  }, [activeCo?.id]);

  // Check session on mount
  useEffect(() => { const s = getSession(); if (s) setCurrentUser(s); }, []);

  const handleLogin = (session) => setCurrentUser(session);
  const handleLogout = () => { if(currentUser) logActivity(currentUser.displayName,'logout','','Cerró sesión',activeCo?.name); saveSession(null); setCurrentUser(null); };

  const switchCompany = (id) => {
    setActiveCoId(id); setActiveCompanyId(id); setCrmState(loadCompanyState(id));
    const co = companies.find(c=>c.id===id);
    if(currentUser&&co) logActivity(currentUser.displayName,'switch_company','',co.name,co.name);
  };

  const updateInfState = useCallback((username, newState) => {
    setCrmState(prev => { const next = {...prev,[username]:newState}; if(activeCo) saveCompanyState(activeCo.id, next); return next; });
  }, [activeCo?.id]);

  const handleSaveCompanies = (list) => { setCompanies(list); saveCompanies(list); };

  const loadSheet = useCallback(async () => {
    setSyncStatus('loading');
    try { const data = await loadSheetGviz(SHEET_ID,SHEET_GID); setInfluencers(parseSheetData(data)); setSyncStatus('ok'); }
    catch(err) { console.error(err); setSyncStatus('error'); }
  }, []);

  useEffect(() => { if(currentUser) loadSheet(); }, [currentUser, loadSheet]);

  if (!currentUser) return <AuthScreen onLogin={handleLogin} />;

  const userName = currentUser.displayName;
  const total = influencers.length;
  const contacted = influencers.filter(i=>getInfState(crmState,i.username).status!=='pendiente').length;
  const responded = influencers.filter(i=>['respondio','en_negociacion','cerrado_si'].includes(getInfState(crmState,i.username).status)).length;
  const closed = influencers.filter(i=>getInfState(crmState,i.username).status==='cerrado_si').length;
  const totalMessages = influencers.reduce((s,i)=>s+getInfState(crmState,i.username).count,0);
  const progressPct = total>0?Math.round((contacted/total)*100):0;

  const countries = [...new Set(influencers.map(i=>i.country).filter(Boolean))].sort();
  const cities = [...new Set(influencers.filter(i=>filterCountry==='all'||i.country===filterCountry).map(i=>i.city).filter(Boolean))].sort();
  const scoreRanges = [{key:'all',label:'Todos'},{key:'9-10',label:'9-10 (Top)'},{key:'7-8',label:'7-8 (Alto)'},{key:'4-6',label:'4-6 (Medio)'},{key:'1-3',label:'1-3 (Bajo)'},{key:'0',label:'Sin score'}];

  const filtered = influencers.filter(inf => {
    const s = getInfState(crmState,inf.username).status;
    if(search){const q=search.toLowerCase();if(!inf.name.toLowerCase().includes(q)&&!inf.username.toLowerCase().includes(q))return false;}
    if(filterCountry!=='all'&&inf.country!==filterCountry)return false;
    if(filterCity!=='all'&&inf.city!==filterCity)return false;
    if(filterScore!=='all'){const sc=inf.aiScore||0;switch(filterScore){case '9-10':if(sc<9)return false;break;case '7-8':if(sc<7||sc>=9)return false;break;case '4-6':if(sc<4||sc>=7)return false;break;case '1-3':if(sc<1||sc>=4)return false;break;case '0':if(sc>0)return false;break;}}
    switch(filter){case 'high':return inf.potential==='Alto';case 'pending':return s==='pendiente';case 'inprogress':return['enviado_1','fu1_enviado','fu2_enviado','fu3_enviado','en_negociacion'].includes(s);case 'responded':return['respondio','cerrado_si'].includes(s);default:return true;}
  });

  return (<>
    {/* Company Bar */}
    <div className="company-bar" style={{background:activeTheme.accent2}}>
      <div className="company-bar-left">
        <span className="co-icon">{activeCo?.icon}</span>
        <span>{activeCo?.name}</span>
        {activeCo?.description && <span style={{fontWeight:400,fontSize:'0.78rem',opacity:0.8}}>— {activeCo.description}</span>}
      </div>
      <div className="company-bar-right">
        <select className="company-selector" value={activeCo?.id} onChange={e => switchCompany(e.target.value)}>
          {companies.map(co => <option key={co.id} value={co.id}>{co.icon} {co.name}</option>)}
        </select>
        <button className="co-manage-btn" onClick={() => setCoManagerOpen(true)}>⚙️ Compañías</button>
        <div className="user-badge">
          <div className="user-avatar-sm">{userName.charAt(0).toUpperCase()}</div>
          <span className="user-name">{userName}</span>
          <button className="logout-btn" onClick={handleLogout}>Salir</button>
        </div>
      </div>
    </div>

    {coManagerOpen && <CompanyManager companies={companies} onSave={handleSaveCompanies} onClose={() => setCoManagerOpen(false)} />}

    <div className="header">
      <div className="header-top">
        <h1>{activeCo?.icon} <span>{activeCo?.name}</span> CRM</h1>
        <div className="header-actions">
          <span className={`sync-status ${syncStatus==='ok'?'ok':syncStatus==='error'?'err':syncStatus==='loading'?'loading':''}`}>
            {syncStatus==='loading'?'⏳ Cargando...':syncStatus==='ok'?'✅ Sincronizado':syncStatus==='error'?'❌ Error':'⏸️'}
          </span>
          <button className="btn btn-sm" onClick={loadSheet}>🔄</button>
          <button className="btn btn-sm" onClick={()=>setActivityOpen(true)}>📊 Actividad</button>
          <a href={SHEET_URL} target="_blank" className="btn btn-sm">📊 Sheet</a>
        </div>
      </div>
    </div>

    <ActivityPanel open={activityOpen} onClose={()=>setActivityOpen(false)} />

    <div className="stats">
      <div className="stat"><div className="stat-label">Total</div><div className="stat-value accent">{total}</div></div>
      <div className="stat"><div className="stat-label">Contactadas</div><div className="stat-value yellow">{contacted}</div></div>
      <div className="stat"><div className="stat-label">Respondieron</div><div className="stat-value green">{responded}</div></div>
      <div className="stat"><div className="stat-label">Cerradas</div><div className="stat-value pink">{closed}</div></div>
      <div className="stat"><div className="stat-label">Mensajes</div><div className="stat-value">{totalMessages}</div></div>
    </div>

    <div className="progress-wrap">
      <div className="progress-bar"><div className="progress-fill" style={{width:`${progressPct}%`}}/></div>
      <div style={{fontSize:'0.72rem',color:'var(--text2)',marginTop:'4px',textAlign:'right'}}>{progressPct}% contactadas</div>
    </div>

    <div className="controls">
      <input className="search-input" placeholder="🔍 Buscar..." value={search} onChange={e=>setSearch(e.target.value)} />
      {[{key:'all',label:'Todas'},{key:'high',label:'🔥 Alta'},{key:'pending',label:'⏳ Pendientes'},{key:'inprogress',label:'📤 En proceso'},{key:'responded',label:'💬 Respondieron'}].map(f=>(
        <button key={f.key} className={`filter-btn${filter===f.key?' active':''}`} onClick={()=>setFilter(f.key)}>{f.label}</button>
      ))}
    </div>

    <div className="filter-row">
      <span className="filter-label">Filtros:</span>
      <select className="filter-select" value={filterScore} onChange={e=>setFilterScore(e.target.value)}>
        {scoreRanges.map(s=><option key={s.key} value={s.key}>{`🤖 AI: ${s.label}`}</option>)}
      </select>
      <select className="filter-select" value={filterCountry} onChange={e=>{setFilterCountry(e.target.value);setFilterCity('all');}}>
        <option value="all">🌎 País: Todos</option>
        {countries.map(c=><option key={c} value={c}>{`🌎 ${c}`}</option>)}
      </select>
      <select className="filter-select" value={filterCity} onChange={e=>setFilterCity(e.target.value)}>
        <option value="all">📍 Ciudad: Todas</option>
        {cities.map(c=><option key={c} value={c}>{`📍 ${c}`}</option>)}
      </select>
      {(filterScore!=='all'||filterCountry!=='all'||filterCity!=='all')&&<button className="btn btn-sm" onClick={()=>{setFilterScore('all');setFilterCountry('all');setFilterCity('all');}}>✕ Limpiar</button>}
    </div>

    {filtered.length===0?(
      <div className="empty"><h2>{syncStatus==='loading'?'⏳ Cargando...':'🔍 Sin resultados'}</h2><p>{syncStatus==='loading'?'Conectando...':'Cambia los filtros'}</p></div>
    ):(
      <div className="cards">
        {filtered.map(inf=>(<InfluencerCard key={inf.id} inf={inf} infState={getInfState(crmState,inf.username)} onUpdateState={updateInfState} expanded={!!expanded[inf.id]} onToggle={()=>setExpanded(p=>({...p,[inf.id]:!p[inf.id]}))} currentUser={userName} company={activeCo} />))}
      </div>
    )}
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
