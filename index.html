<title>Influencer CRM — Brand Ambassador</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --card2: #22252f; --border: #2a2d3a;
    --text: #e4e4e7; --text2: #a1a1aa; --accent: #818cf8; --accent2: #6366f1;
    --green: #22c55e; --yellow: #eab308; --red: #ef4444; --orange: #f97316;
    --blue: #3b82f6; --pink: #ec4899; --teal: #14b8a6;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  a { color:var(--accent); text-decoration:none; }
  a:hover { text-decoration:underline; }

  /* Header */
  .header { background:var(--card); border-bottom:1px solid var(--border); padding:16px 24px; position:sticky; top:0; z-index:100; }
  .header-top { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  .header h1 { font-size:1.4rem; font-weight:700; }
  .header h1 span { color:var(--accent); }
  .header-actions { display:flex; gap:8px; align-items:center; }
  .sync-status { font-size:0.75rem; color:var(--text2); padding:4px 10px; border-radius:12px; background:var(--card2); }
  .sync-status.ok { color:var(--green); }
  .sync-status.err { color:var(--red); }
  .sync-status.loading { color:var(--yellow); }

  /* Buttons */
  .btn { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:var(--card2); color:var(--text); cursor:pointer; font-size:0.85rem; transition:all .2s; display:inline-flex; align-items:center; gap:6px; }
  .btn:hover { background:var(--accent2); border-color:var(--accent2); color:#fff; }
  .btn-sm { padding:5px 10px; font-size:0.78rem; }
  .btn-accent { background:var(--accent2); border-color:var(--accent2); color:#fff; }
  .btn-accent:hover { background:var(--accent); }
  .btn-green { background:#166534; border-color:#166534; color:#fff; }
  .btn-green:hover { background:var(--green); color:#000; }

  /* Stats */
  .stats { display:flex; gap:12px; padding:16px 24px; flex-wrap:wrap; }
  .stat { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 20px; flex:1; min-width:140px; }
  .stat-label { font-size:0.75rem; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; }
  .stat-value { font-size:1.6rem; font-weight:700; margin-top:4px; }
  .stat-value.accent { color:var(--accent); }
  .stat-value.green { color:var(--green); }
  .stat-value.yellow { color:var(--yellow); }
  .stat-value.pink { color:var(--pink); }

  /* Progress bar */
  .progress-wrap { padding:0 24px 8px; }
  .progress-bar { height:6px; background:var(--card2); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg, var(--accent2), var(--green)); border-radius:3px; transition:width .5s; }

  /* Search & Filters */
  .controls { padding:12px 24px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .search-input { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px 14px; color:var(--text); font-size:0.9rem; width:260px; outline:none; }
  .search-input:focus { border-color:var(--accent); }
  .filter-btn { padding:6px 14px; border-radius:20px; border:1px solid var(--border); background:var(--card); color:var(--text2); cursor:pointer; font-size:0.8rem; transition:all .2s; }
  .filter-btn:hover, .filter-btn.active { background:var(--accent2); color:#fff; border-color:var(--accent2); }
  .filter-select { padding:6px 12px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:0.8rem; cursor:pointer; outline:none; min-width:120px; }
  .filter-select:focus { border-color:var(--accent); }
  .filter-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; padding:0 24px 8px; }
  .filter-label { font-size:0.72rem; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; }

  /* Cards grid */
  .cards { padding:12px 24px 40px; display:grid; grid-template-columns:repeat(auto-fill, minmax(380px, 1fr)); gap:14px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:all .2s; }
  .card:hover { border-color:var(--accent); }
  .card-head { padding:16px; display:flex; justify-content:space-between; align-items:flex-start; cursor:pointer; }
  .card-info { display:flex; gap:12px; align-items:center; flex:1; min-width:0; }
  .avatar { width:48px; height:48px; border-radius:50%; background:var(--accent2); display:flex; align-items:center; justify-content:center; font-size:1.2rem; font-weight:700; color:#fff; flex-shrink:0; }
  .card-name { font-weight:600; font-size:0.95rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-user { font-size:0.8rem; color:var(--text2); }

  .badge-medio { background:#422006; color:var(--yellow); }
  .badge-bajo { background:#1a2e05; color:var(--green); }

  .s-pendiente { background:#422006; color:var(--yellow); }

  .s-respondio { background:#052e16; color:var(--green); }

  .s-cerrado_si { background:#052e16; color:var(--green); font-weight:700; }
  .s-no_interesada { background:#2a0a0a; color:var(--red); }

  /* Card expanded */

  .card.expanded .card-body { display:block; }
  .section-title { font-size:0.75rem; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; margin:12px 0 6px; }
  .bio-text { font-size:0.83rem; color:var(--text2); line-height:1.5; }
  .msg-card { background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:12px; margin:6px 0; }
  .msg-label { font-size:0.72rem; color:var(--accent); font-weight:600; text-transform:uppercase; margin-bottom:6px; }
  .msg-text { font-size:0.83rem; line-height:1.5; white-space:pre-wrap; }
  .msg-actions { display:flex; gap:6px; margin-top:8px; }
  .tip-box { background:#1e1b4b; border:1px solid var(--accent2); border-radius:10px; padding:12px; margin:6px 0; }
  .tip-box .msg-label { color:var(--yellow); }

  .notes-area { width:100%; background:var(--card2); border:1px solid var(--border); border-radius:8px; padding:10px; color:var(--text); font-size:0.83rem; resize:vertical; min-height:60px; outline:none; font-family:inherit; }
  .notes-area:focus { border-color:var(--accent); }

  /* History */
  .history-item { font-size:0.78rem; color:var(--text2); padding:4px 0; border-bottom:1px solid var(--border); }
  .history-item:last-child { border-bottom:none; }
  .history-date { color:var(--accent); font-weight:600; }

  .counter-val { font-size:1.1rem; font-weight:700; color:var(--accent); }

  /* Empty state */
  .empty { text-align:center; padding:60px 24px; color:var(--text2); }
  .empty h2 { font-size:1.2rem; margin-bottom:8px; }

  /* Responsive */

    .stats { padding:12px; gap:8px; }
    .stat { min-width:100px; padding:10px 14px; }
    .controls { padding:8px 12px; }
    .search-input { width:100%; }
    .header { padding:12px 16px; }
  }
</style>

/* ─── Sheet loading (GViz) ─── */
function loadSheetGviz(sheetId, gid) {
  return new Promise((resolve, reject) => {
    const SCRIPT_ID = '_gviz_load';
    const old = document.getElementById(SCRIPT_ID);
    if (old) old.remove();

    const timer = setTimeout(() => {
      const el = document.getElementById(SCRIPT_ID);
      if (el) el.remove();
      reject(new Error('Timeout cargando el Sheet'));
    }, 15000);

    window.google = window.google || {};
    window.google.visualization = window.google.visualization || {};
    window.google.visualization.Query = window.google.visualization.Query || {};
    window.google.visualization.Query.setResponse = (data) => {
      clearTimeout(timer);
      const el = document.getElementById(SCRIPT_ID);
      if (el) el.remove();
      if (!data || data.status === 'error') {
        reject(new Error(data?.errors?.[0]?.message || 'Error en el Sheet'));
      } else {
        resolve(data);
      }
    };

    const s = document.createElement('script');
    s.id = SCRIPT_ID;
    s.onerror = () => { clearTimeout(timer); reject(new Error('No se pudo cargar el script')); };
    s.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`;
    document.head.appendChild(s);
  });
}

function parseSheetData(data) {
  const { cols, rows } = data.table;
  const idx = {};
  cols.forEach((c, i) => { if (c.label) idx[c.label.trim()] = i; });

  function get(row, label) {
    const i = idx[label];
    if (i == null || !row.c?.[i]) return '';
    const cell = row.c[i];
    return (cell.f != null ? String(cell.f) : (cell.v != null ? String(cell.v) : '')).trim();
  }

  return rows.map(row => {
    if (!row?.c) return null;
    const username = get(row, 'username').replace(/^@/, '').trim();
    if (!username) return null;

    // Format followers number
    let followersRaw = get(row, 'followers_num');
    let followers = '';
    if (followersRaw) {
      const num = parseInt(followersRaw, 10);
      if (!isNaN(num)) {
        if (num >= 1000000) followers = (num / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
        else if (num >= 1000) followers = (num / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
        else followers = String(num);
      } else {
        followers = followersRaw;
      }
    }

    // Use username as display name (capitalize first letter)
    const name = username.replace(/[._]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

    // Derive potential from ai_score
    const aiScore = parseFloat(get(row, 'ai_score')) || 0;
    let potential = '';
    if (aiScore >= 7) potential = 'Alto';
    else if (aiScore >= 4) potential = 'Medio';
    else if (aiScore > 0) potential = 'Bajo';

    return {
      id: username,
      username,
      name,
      country: get(row, 'country'),
      city: get(row, 'city'),
      followers,
      posts: get(row, 'posts_num'),
      following: get(row, 'following_num'),
      source: get(row, 'source_acccount'),
      potential,
      lifestyle: '',
      bio: get(row, 'bio_completa'),
      accountStatus: get(row, 'active_following') === 'true' ? 'Activa' : '',
      verified: '',
      appearance: '',
      contentType: get(row, 'category'),
      links: get(row, 'link_bio'),
      category: get(row, 'category'),
      ambassador: get(row, 'ai_status'),
      notes_sheet: get(row, 'ai_reason'),
      aiScore,
      hasReplied: get(row, 'has_replied'),
      followups: get(row, 'number_followups'),
    };
  }).filter(Boolean);
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return {};
    const parsed = JSON.parse(raw);
    // Migrate v3 (numeric keys) → v4 (username keys) not needed if clean
    return parsed;
  } catch { return {}; }
}

function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

function getInfState(state, username) {

/* ─── Copy helper ─── */
async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch {
    // Fallback for file:// protocol
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-9999px';
    document.body.appendChild(ta);
    ta.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch {}
    document.body.removeChild(ta);
    return ok;
  }
}

/* ─── Components ─── */

function CopyBtn({ text }) {
  const [copied, setCopied] = useState(false);
  const handleCopy = async (e) => {
    e.stopPropagation();
    const ok = await copyText(text);
    if (ok) { setCopied(true); setTimeout(() => setCopied(false), 2000); }
  };
  return (
    <button className="btn btn-sm" onClick={handleCopy}>
      {copied ? '✅ Copiado' : '📋 Copiar'}
    </button>
  );
}

function MsgCard({ label, text, color }) {
  return (
    <div className="msg-card">
      <div className="msg-label" style={color ? { color } : {}}>{label}</div>
      <div className="msg-text">{text}</div>
      <div className="msg-actions">
        <CopyBtn text={text} />
      </div>
    </div>
  );
}

function InfluencerCard({ inf, infState, onUpdateState, expanded, onToggle }) {
  const msgs = MESSAGES_DB[inf.username] || genMessages(inf.name.split(' ')[0]);
  const tip = TIPS_DB[inf.username] || genTip(inf);
  const statusObj = STATUS_OPTIONS.find(s => s.value === infState.status) || STATUS_OPTIONS[0];

  const nextStep = () => {
    const currentIdx = STATUS_FLOW.indexOf(infState.status);
    if (currentIdx < 0 || currentIdx >= STATUS_FLOW.length - 1) return;
    const nextStatus = STATUS_FLOW[currentIdx + 1];
    const nextLabel = STATUS_OPTIONS.find(s => s.value === nextStatus)?.label || nextStatus;
    const now = new Date().toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' });
    onUpdateState(inf.username, {
      ...infState,
      status: nextStatus,
      count: infState.count + (nextStatus.includes('enviado') || nextStatus.includes('fu') ? 1 : 0),
      history: [...(infState.history || []), { date: now, action: nextLabel }]
    });
  };

  const setStatus = (value) => {
    const label = STATUS_OPTIONS.find(s => s.value === value)?.label || value;
    const now = new Date().toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' });
    onUpdateState(inf.username, {
      ...infState,
      status: value,
      history: [...(infState.history || []), { date: now, action: `Cambio a: ${label}` }]
    });
  };

  const updateNotes = (notes) => {
    onUpdateState(inf.username, { ...infState, notes });
  };

  const initial = inf.name.charAt(0).toUpperCase();

  return (
    <div className={`card${expanded ? ' expanded' : ''}`}>
      <div className="card-head" onClick={onToggle}>
        <div className="card-info">
          <div className="avatar">{initial}</div>
          <div style={{minWidth:0}}>
            <div className="card-name">{inf.name}</div>
            <div className="card-user">
              <a href={`https://instagram.com/${inf.username}`} target="_blank" onClick={e => e.stopPropagation()}>@{inf.username}</a>
            </div>
            <div className="card-meta">
              {inf.followers && `${inf.followers} seguidores`}
              {inf.city && ` · ${inf.city}`}
              {inf.country && `, ${inf.country}`}
            </div>
            <div className="card-badges">
              {inf.potential === 'Alto' && <span className="badge badge-high">🔥 Alto</span>}
              {inf.potential === 'Medio' && <span className="badge badge-medio">⚡ Medio</span>}
              {inf.potential === 'Bajo' && <span className="badge badge-bajo">📊 Bajo</span>}
              {inf.verified && inf.verified.includes('✔') && <span className="badge badge-verified">✔️ Verificada</span>}
              {inf.contentType && <span className="badge" style={{background:'#1a2e3a',color:'var(--teal)'}}>{inf.contentType}</span>}
            </div>
          </div>
        </div>
        <span className={`status-badge ${statusObj.cls}`}>{statusObj.label}</span>
      </div>

      <div className="card-body">
        {/* Bio */}
        {inf.bio && <>
          <div className="section-title">Bio</div>
          <div className="bio-text">{inf.bio}</div>
        </>}

        {/* Tip */}
        <div className="tip-box">
          <div className="msg-label" style={{color:'var(--yellow)'}}>💡 Tip estratégico</div>
          <div className="msg-text">{tip}</div>
        </div>

        {/* Messages */}
        <div className="section-title">Mensajes</div>
        <MsgCard label="📤 Primer contacto" text={msgs.first} />
        <MsgCard label="🔄 Follow Up 1 (día 3)" text={msgs.fu1} color="var(--teal)" />
        <MsgCard label="🔄 Follow Up 2 (día 7)" text={msgs.fu2} color="var(--orange)" />
        <MsgCard label="🔄 Follow Up 3 (día 14)" text={msgs.fu3} color="var(--red)" />

        {/* Actions */}
        <div className="section-title">Acciones</div>
        <div style={{display:'flex', gap:'8px', flexWrap:'wrap', margin:'8px 0'}}>
          <button className="btn btn-green btn-sm" onClick={nextStep}>▶ Siguiente paso</button>
          <select
            className="btn btn-sm"
            value={infState.status}
            onChange={e => setStatus(e.target.value)}
            onClick={e => e.stopPropagation()}
          >
            {STATUS_OPTIONS.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
          </select>
        </div>

        {/* Contact counter */}
        <div className="contact-counter">
          <span style={{fontSize:'0.8rem', color:'var(--text2)'}}>Contactos realizados:</span>
          <span className="counter-val">{infState.count}</span>
        </div>

        {/* Notes */}
        <div className="section-title">Notas del equipo</div>
        <textarea
          className="notes-area"
          value={infState.notes || ''}
          onChange={e => updateNotes(e.target.value)}
          placeholder="Agrega notas sobre esta influencer..."
          onClick={e => e.stopPropagation()}
        />

        {/* History */}
        {infState.history && infState.history.length > 0 && <>
          <div className="section-title">Historial</div>
          {infState.history.slice().reverse().map((h, i) => (
            <div className="history-item" key={i}>
              <span className="history-date">{h.date}</span> — {h.action}
            </div>
          ))}
        </>}
      </div>
    </div>
  );
}

function App() {
  const [influencers, setInfluencers] = useState([]);
  const [crmState, setCrmState] = useState(loadState);
  const [syncStatus, setSyncStatus] = useState('idle');
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [filterCountry, setFilterCountry] = useState('all');
  const [filterCity, setFilterCity] = useState('all');
  const [filterScore, setFilterScore] = useState('all');
  const [expanded, setExpanded] = useState({});

  const updateInfState = useCallback((username, newState) => {
    setCrmState(prev => {
      const next = { ...prev, [username]: newState };
      saveState(next);
      return next;
    });
  }, []);

  const loadSheet = useCallback(async () => {
    setSyncStatus('loading');
    try {
      const data = await loadSheetGviz(SHEET_ID, SHEET_GID);
      const parsed = parseSheetData(data);
      setInfluencers(parsed);
      setSyncStatus('ok');
    } catch (err) {
      console.error('Error loading sheet:', err);
      setSyncStatus('error');
    }
  }, []);

  useEffect(() => { loadSheet(); }, [loadSheet]);

  // Stats
  const total = influencers.length;
  const contacted = influencers.filter(i => {
    const s = getInfState(crmState, i.username).status;
    return s !== 'pendiente';
  }).length;
  const responded = influencers.filter(i => {
    const s = getInfState(crmState, i.username).status;
    return ['respondio','en_negociacion','cerrado_si'].includes(s);
  }).length;
  const closed = influencers.filter(i => getInfState(crmState, i.username).status === 'cerrado_si').length;
  const totalMessages = influencers.reduce((sum, i) => sum + getInfState(crmState, i.username).count, 0);
  const progressPct = total > 0 ? Math.round((contacted / total) * 100) : 0;

  // Unique values for dropdown filters
  const countries = [...new Set(influencers.map(i => i.country).filter(Boolean))].sort();
  const cities = [...new Set(influencers
    .filter(i => filterCountry === 'all' || i.country === filterCountry)
    .map(i => i.city).filter(Boolean))].sort();
  const scoreRanges = [
    { key: 'all', label: 'Todos' },
    { key: '9-10', label: '9-10 (Top)' },
    { key: '7-8', label: '7-8 (Alto)' },
    { key: '4-6', label: '4-6 (Medio)' },
    { key: '1-3', label: '1-3 (Bajo)' },
    { key: '0', label: 'Sin score' },
  ];

  // Filter
  const filtered = influencers.filter(inf => {
    const s = getInfState(crmState, inf.username).status;
    if (search) {
      const q = search.toLowerCase();
      if (!inf.name.toLowerCase().includes(q) && !inf.username.toLowerCase().includes(q)) return false;
    }
    // Country filter
    if (filterCountry !== 'all' && inf.country !== filterCountry) return false;
    // City filter
    if (filterCity !== 'all' && inf.city !== filterCity) return false;
    // AI Score filter
    if (filterScore !== 'all') {
      const score = inf.aiScore || 0;
      switch (filterScore) {
        case '9-10': if (score < 9) return false; break;
        case '7-8': if (score < 7 || score >= 9) return false; break;
        case '4-6': if (score < 4 || score >= 7) return false; break;
        case '1-3': if (score < 1 || score >= 4) return false; break;
        case '0': if (score > 0) return false; break;
      }
    }
    // Status filter
    switch (filter) {
      case 'high': return inf.potential === 'Alto';
      case 'pending': return s === 'pendiente';
      case 'inprogress': return ['enviado_1','fu1_enviado','fu2_enviado','fu3_enviado','en_negociacion'].includes(s);
      case 'responded': return ['respondio','cerrado_si'].includes(s);
      default: return true;
    }
  });

  const toggleCard = (id) => setExpanded(prev => ({ ...prev, [id]: !prev[id] }));

  return (
    <>
      <div className="header">
        <div className="header-top">
          <h1>👙 Influencer <span>CRM</span></h1>
          <div className="header-actions">
            <span className={`sync-status ${syncStatus === 'ok' ? 'ok' : syncStatus === 'error' ? 'err' : syncStatus === 'loading' ? 'loading' : ''}`}>
              {syncStatus === 'loading' ? '⏳ Cargando...' : syncStatus === 'ok' ? '✅ Sincronizado' : syncStatus === 'error' ? '❌ Error' : '⏸️ Sin cargar'}
            </span>
            <button className="btn btn-sm" onClick={loadSheet}>🔄 Actualizar</button>
            <a href={SHEET_URL} target="_blank" className="btn btn-sm">📊 Sheet</a>
          </div>
        </div>
      </div>

      <div className="stats">
        <div className="stat">
          <div className="stat-label">Total influencers</div>
          <div className="stat-value accent">{total}</div>
        </div>
        <div className="stat">
          <div className="stat-label">Contactadas</div>
          <div className="stat-value yellow">{contacted}</div>
        </div>
        <div className="stat">
          <div className="stat-label">Respondieron</div>
          <div className="stat-value green">{responded}</div>
        </div>
        <div className="stat">
          <div className="stat-label">Cerradas</div>
          <div className="stat-value pink">{closed}</div>
        </div>
        <div className="stat">
          <div className="stat-label">Mensajes enviados</div>
          <div className="stat-value">{totalMessages}</div>
        </div>
      </div>

      <div className="progress-wrap">
        <div className="progress-bar">
          <div className="progress-fill" style={{width: `${progressPct}%`}} />
        </div>
        <div style={{fontSize:'0.72rem', color:'var(--text2)', marginTop:'4px', textAlign:'right'}}>{progressPct}% contactadas</div>
      </div>

      <div className="controls">
        <input
          className="search-input"
          placeholder="🔍 Buscar por nombre o username..."
          value={search}
          onChange={e => setSearch(e.target.value)}
        />
        {[
          { key:'all', label:'Todas' },
          { key:'high', label:'🔥 Prioridad Alta' },
          { key:'pending', label:'⏳ Pendientes' },
          { key:'inprogress', label:'📤 En proceso' },
          { key:'responded', label:'💬 Respondieron' },
        ].map(f => (
          <button key={f.key} className={`filter-btn${filter === f.key ? ' active' : ''}`} onClick={() => setFilter(f.key)}>
            {f.label}
          </button>
        ))}
      </div>

      <div className="filter-row">
        <span className="filter-label">Filtros:</span>
        <select className="filter-select" value={filterScore} onChange={e => setFilterScore(e.target.value)}>
          {scoreRanges.map(s => <option key={s.key} value={s.key}>{`🤖 AI Score: ${s.label}`}</option>)}
        </select>
        <select className="filter-select" value={filterCountry} onChange={e => { setFilterCountry(e.target.value); setFilterCity('all'); }}>
          <option value="all">🌎 País: Todos</option>
          {countries.map(c => <option key={c} value={c}>{`🌎 ${c}`}</option>)}
        </select>
        <select className="filter-select" value={filterCity} onChange={e => setFilterCity(e.target.value)}>
          <option value="all">📍 Ciudad: Todas</option>
          {cities.map(c => <option key={c} value={c}>{`📍 ${c}`}</option>)}
        </select>
        {(filterScore !== 'all' || filterCountry !== 'all' || filterCity !== 'all') && (
          <button className="btn btn-sm" onClick={() => { setFilterScore('all'); setFilterCountry('all'); setFilterCity('all'); }}>✕ Limpiar filtros</button>
        )}
      </div>

      {filtered.length === 0 ? (
        <div className="empty">
          <h2>{syncStatus === 'loading' ? '⏳ Cargando influencers...' : '🔍 No se encontraron resultados'}</h2>
          <p>{syncStatus === 'loading' ? 'Conectando con Google Sheets...' : 'Intenta con otro filtro o término de búsqueda'}</p>
        </div>
      ) : (
        <div className="cards">
          {filtered.map(inf => (
            <InfluencerCard
              key={inf.id}
              inf={inf}
              infState={getInfState(crmState, inf.username)}
              onUpdateState={updateInfState}
              expanded={!!expanded[inf.id]}
              onToggle={() => toggleCard(inf.id)}
            />
          ))}
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
